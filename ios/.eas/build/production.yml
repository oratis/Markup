build:
  name: Markup iOS — App Store archive
  # Custom EAS build for a NATIVE SwiftUI app (not Expo/RN): the EAS macOS
  # worker runs xcodebuild on the Xcode project. Signing is EAS-MANAGED
  # (eas.json production profile sets `credentialsSource: remote`), so the
  # Apple Distribution cert + App Store provisioning profile come from Expo —
  # set up once with `eas credentials`. No API key needed in the build itself;
  # the App Store Connect API key is only used later by `eas submit`.
  #
  # The build number (CFBundleVersion) is DERIVED from MARKETING_VERSION by
  # scripts/derive-build-number.sh (single source of truth). Set IOS_BUILD_BUMP
  # to rebuild the same semver with a fresh build number.
  steps:
    - eas/checkout

    - eas/configure_ios_credentials

    - run:
        name: Archive (App Store, Release)
        working_directory: MarkupApp
        command: |
          set -euo pipefail
          NUM="$(../scripts/derive-build-number.sh)"
          echo "Build number: $NUM"
          xcodebuild \
            -project MarkupApp.xcodeproj \
            -scheme MarkupApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$HOME/markup-build/Markup.xcarchive" \
            CURRENT_PROJECT_VERSION="$NUM" \
            archive

    - run:
        name: Export signed IPA
        working_directory: MarkupApp
        command: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$HOME/markup-build/Markup.xcarchive" \
            -exportPath "$HOME/markup-build/export" \
            -exportOptionsPlist ExportOptions.plist

    - eas/find_and_upload_build_artifacts:
        inputs:
          build_artifact_paths: "/Users/expo/markup-build/export/*.ipa"
  # → then: `eas submit --platform ios --latest`  (uploads to App Store Connect)
  #   and: `python3 scripts/add-to-external-testing.py`  (promote to external)
