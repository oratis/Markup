build:
  name: Markup iOS — App Store archive
  # Native SwiftUI app (project at MarkupApp/). The app archives fine on EAS
  # (verified via the diag profile). Signing uses the EAS-managed Distribution
  # cert + App Store provisioning profile (set up via `eas credentials`),
  # installed by eas/configure_ios_credentials, then built/exported with
  # `fastlane gym` (robust signing/export). The .ipa is uploaded to TestFlight
  # with the App Store Connect API key (altool).
  #
  # Required EAS secrets: ASC_KEY_BASE64, ASC_KEY_ID, ASC_ISSUER_ID (for altool).
  # Build number is derived from MARKETING_VERSION (+ IOS_BUILD_BUMP).
  steps:
    - eas/checkout

    - eas/configure_ios_credentials

    - run:
        name: Install App Store Connect API key (for upload)
        command: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

    - run:
        name: Build IPA (fastlane gym, App Store)
        working_directory: MarkupApp
        command: |
          set -euo pipefail
          NUM="$(bash ../scripts/derive-build-number.sh)"
          echo "Build number: $NUM"
          fastlane gym \
            --project MarkupApp.xcodeproj \
            --scheme MarkupApp \
            --configuration Release \
            --export_method app-store \
            --output_directory ../build \
            --output_name Markup.ipa \
            --xcargs "CURRENT_PROJECT_VERSION=$NUM"

    - run:
        name: Upload to TestFlight
        working_directory: MarkupApp
        command: |
          set -euo pipefail
          xcrun altool --upload-app -f "../build/Markup.ipa" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

    - eas/find_and_upload_build_artifacts
  # → build appears in App Store Connect → TestFlight (~5-10 min processing).
