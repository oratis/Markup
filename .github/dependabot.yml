version: 2
updates:
  # JS / pnpm
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      milkdown:
        patterns:
          - "@milkdown/*"
      codemirror:
        patterns:
          - "@codemirror/*"
      tauri-plugins:
        patterns:
          - "@tauri-apps/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
      build-tools:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "@biomejs/*"
          - "tailwindcss"
          - "autoprefixer"
          - "postcss"

  # Rust / Cargo
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"
      tantivy:
        patterns:
          - "tantivy*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
